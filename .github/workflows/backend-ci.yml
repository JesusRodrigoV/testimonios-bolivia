name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "testimonios-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "testimonios-backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testimonios-backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun test
