<div class="app-container">
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
  <header class="app-header">
    <app-header>
      <button sidenav-button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </app-header>
    <app-search-dialog />

  </header>

  <main class="app-main">
    <mat-drawer-container>
      <mat-drawer #drawer>
        <app-sidenav />
      </mat-drawer>
      <mat-drawer-content id="main-content">
        <router-outlet />
      </mat-drawer-content>
    </mat-drawer-container>
  </main>
</div>
<footer class="app-footer">
  <app-footer />
</footer>
